<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EduPulse - Smart Learning Management</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon"
        href="https://api.dicebear.com/7.x/notionists/svg?seed=EduPulse&backgroundColor=3b82f6">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f4ff',
                            100: '#e0e8ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                        }
                    },
                    animation: {
                        'blob': 'blob 10s infinite',
                        'blob-reverse': 'blob-reverse 12s infinite',
                        'fade-in-up': 'fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(40px, -60px) scale(1.1)' },
                            '66%': { transform: 'translate(-30px, 40px) scale(0.95)' },
                        },
                        'blob-reverse': {
                            '0%, 100%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(-40px, 60px) scale(1.15)' },
                            '66%': { transform: 'translate(30px, -40px) scale(0.9)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            background: #0B0F19;
            /* Darker, richer background to make app pop */
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow:
                0 4px 16px -4px rgba(0, 0, 0, 0.05),
                inset 0 1px 1px rgba(255, 255, 255, 1);
        }

        .mesh-bg {
            background-color: #f8fafc;
            background-image:
                radial-gradient(at 10% 0%, hsla(253, 16%, 7%, 0.03) 0px, transparent 50%),
                radial-gradient(at 80% 0%, hsla(189, 100%, 56%, 0.08) 0px, transparent 50%),
                radial-gradient(at 0% 50%, hsla(355, 100%, 93%, 0.5) 0px, transparent 50%),
                radial-gradient(at 80% 50%, hsla(340, 100%, 76%, 0.08) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(22, 100%, 77%, 0.08) 0px, transparent 50%),
                radial-gradient(at 80% 100%, hsla(242, 100%, 70%, 0.2) 0px, transparent 50%),
                radial-gradient(at 0% 0%, hsla(343, 100%, 76%, 0.05) 0px, transparent 50%);
        }

        .glowing-shadow-indigo {
            box-shadow: 0 10px 40px -10px rgba(79, 70, 229, 0.5);
        }

        .glowing-shadow-teal {
            box-shadow: 0 10px 40px -10px rgba(13, 148, 136, 0.5);
        }

        .glowing-shadow-rose {
            box-shadow: 0 10px 40px -10px rgba(225, 29, 72, 0.5);
        }

        .glowing-shadow-amber {
            box-shadow: 0 10px 40px -10px rgba(217, 119, 6, 0.5);
        }

        /* --- Responsive Structural Overhaul --- */
        :root {
            --sidebar-width: 280px;
        }

        .app-shell {
            display: flex;
            width: 100%;
            min-height: 100vh;
            background: #F8FAFC;
        }

        .sidebar-container {
            width: var(--sidebar-width);
            height: 100vh;
            position: sticky;
            top: 0;
            background: white;
            border-right: 1px solid #E2E8F0;
            z-index: 50;
            display: none;
            /* Hidden on Mobile */
        }

        .main-content {
            flex: 1;
            width: 100%;
            max-width: 100%;
            margin: 0 auto;
            position: relative;
            background: #fdfdff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Content Limiter for Professional Desktop look */
        .content-limiter {
            width: 100%;
            max-width: 64rem;
            /* max-w-4xl */
            margin: 0 auto;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            .sidebar-container {
                display: block;
                /* Show on Desktop */
            }

            .main-content {
                padding-bottom: 0px;
            }

            .mobile-nav {
                display: none !important;
            }
        }

        /* Fluid Adjustments */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .app-container {
            /* Removed fixed mobile constraints */
            width: 100%;
            height: 100%;
            max-width: none;
            max-height: none;
            border-radius: 0;
            box-shadow: none;
            padding: 0;
        }

        .mesh-bg {
            background-color: #f8fafc;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 1) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 1) 0, transparent 50%);
            /* Adjusted for a lighter, cleaner desktop feel */
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.05) 0, transparent 50%),
                radial-gradient(at 50% 0%, rgba(139, 92, 246, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(244, 63, 94, 0.05) 0, transparent 50%);
        }

        /* Bottom Nav Mobile styles */
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: clamp(80px, 12vh, 100px);
            z-index: 100;
        }
    </style>
</head>

        // 2. Lucide Icon Wrapper
        const Icon = React.memo(({ name, size = 24, className = "" }) => {
            const spanRef = React.useRef(null);

            React.useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: spanRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);

            return <span ref={spanRef} className="inline-flex items-center justify-center"></span>;
        });

        // 3. Screens
        const AuthScreen = ({ t, onLogin }) => {
            const [isLogin, setIsLogin] = React.useState(true);
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [name, setName] = React.useState('');
            const [selectedRole, setSelectedRole] = React.useState('student');
            const [errorMsg, setErrorMsg] = React.useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                setErrorMsg('');

                if (!email || !password || (!isLogin && !name)) {
                    setErrorMsg(t.errorEmpty);
                    return;
                }

                // Mock Database in LocalStorage
                const db = JSON.parse(localStorage.getItem('eduPulse_users') || '{}');

                if (isLogin) {
                    const user = db[email];
                    if (user && user.password === password) {
                        // Persist session
                        localStorage.setItem('eduPulse_session', JSON.stringify(user));
                        onLogin(user);
                    } else {
                        setErrorMsg(t.errorInvalidCreds);
                    }
                } else {
                    if (db[email]) {
                        setErrorMsg(t.errorEmailExists);
                        return;
                    }
                    const newUser = { email, name, role: selectedRole, password };
                    db[email] = newUser;
                    localStorage.setItem('eduPulse_users', JSON.stringify(db));
                    // Persist session
                    localStorage.setItem('eduPulse_session', JSON.stringify(newUser));
                    onLogin(newUser);
                }
            };

            return (
                <div className="flex-1 flex flex-col p-8 relative z-10 w-full overflow-y-auto no-scrollbar pb-24 h-full">
                    {/* Abstract Backgrounds */}
                    <div className="absolute top-[-10%] right-[-10%] w-[120%] h-[50%] bg-gradient-to-br from-indigo-300 via-purple-300 to-pink-300 rounded-full mix-blend-multiply filter blur-[80px] opacity-70 animate-blob pointer-events-none"></div>
                    <div className="absolute bottom-[-10%] left-[-10%] w-[120%] h-[50%] bg-gradient-to-tr from-cyan-300 via-teal-300 to-emerald-300 rounded-full mix-blend-multiply filter blur-[80px] opacity-70 animate-blob-reverse pointer-events-none" style={{ animationDelay: '2s' }}></div>

                    <div className="flex-1 flex flex-col pt-10 relative z-20 w-full animate-fade-in-up">
                        {/* Header */}
                        <div className="mb-10 text-center">
                            <div className="w-20 h-20 bg-white/40 backdrop-blur-xl rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-xl border border-white/60">
                                <div className="w-14 h-14 bg-gradient-to-tr from-indigo-600 to-purple-500 rounded-[12px] flex items-center justify-center glowing-shadow-indigo">
                                    <Icon name="graduation-cap" size={32} className="text-white" />
                                </div>
                            </div>
                            <h1 className="text-4xl font-black text-slate-900 tracking-tight font-display mb-2">{isLogin ? t.welcome : t.appTitle}</h1>
                            <p className="text-slate-600 font-medium">{t.subtitle}</p>
                        </div>

                        {/* Form Area */}
                        <form onSubmit={handleSubmit} className="w-full glass-card p-6 rounded-[2.5rem] shadow-xl relative text-left">

                            {errorMsg && (
                                <div className="mb-4 bg-rose-50 border border-rose-200 text-rose-600 px-4 py-3 rounded-2xl flex items-center gap-2 text-sm font-bold animate-fade-in-up">
                                    <Icon name="alert-circle" size={18} />
                                    {errorMsg}
                                </div>
                            )}

                            {!isLogin && (
                                <div className="mb-4 animate-fade-in-up">
                                    <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.nameLabel}</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                            <Icon name="user" size={18} className="text-slate-400" />
                                        </div>
                                        <input
                                            type="text"
                                            value={name}
                                            onChange={e => setName(e.target.value)}
                                            className="w-full bg-white/50 border border-white focus:border-indigo-400 text-slate-800 rounded-2xl pl-11 pr-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all font-medium"
                                        />
                                    </div>
                                </div>
                            )}

                            <div className="mb-4 animate-fade-in-up" style={{ animationDelay: '0.1s' }}>
                                <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.emailLabel}</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                        <Icon name="mail" size={18} className="text-slate-400" />
                                    </div>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={e => setEmail(e.target.value)}
                                        className="w-full bg-white/50 border border-white focus:border-indigo-400 text-slate-800 rounded-2xl pl-11 pr-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all font-medium"
                                    />
                                </div>
                            </div>

                            <div className="mb-6 animate-fade-in-up" style={{ animationDelay: '0.2s' }}>
                                <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.passwordLabel}</label>
                                <div className="relative">
                                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                        <Icon name="lock" size={18} className="text-slate-400" />
                                    </div>
                                    <input
                                        type="password"
                                        value={password}
                                        onChange={e => setPassword(e.target.value)}
                                        className="w-full bg-white/50 border border-white focus:border-indigo-400 text-slate-800 rounded-2xl pl-11 pr-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-indigo-500/10 transition-all font-medium"
                                    />
                                </div>
                            </div>

                            {!isLogin && (
                                <div className="mb-8 animate-fade-in-up" style={{ animationDelay: '0.3s' }}>
                                    <label className="block text-slate-700 text-sm font-bold mb-3 ml-2">{t.roleLabel}</label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button
                                            type="button"
                                            onClick={() => setSelectedRole('student')}
                                            className={`py-3 px-4 rounded-2xl flex items-center justify-center gap-2 border-2 transition-all font-bold ${selectedRole === 'student' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-transparent bg-slate-100 text-slate-500'}`}
                                        >
                                            <Icon name="user" size={18} /> {t.studentLabel}
                                        </button>
                                        <button
                                            type="button"
                                            onClick={() => setSelectedRole('teacher')}
                                            className={`py-3 px-4 rounded-2xl flex items-center justify-center gap-2 border-2 transition-all font-bold ${selectedRole === 'teacher' ? 'border-teal-500 bg-teal-50 text-teal-700' : 'border-transparent bg-slate-100 text-slate-500'}`}
                                        >
                                            <Icon name="briefcase" size={18} /> {t.teacherLabel}
                                        </button>
                                    </div>
                                </div>
                            )}

                            <button
                                type="submit"
                                className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-display font-bold px-8 py-4 rounded-2xl shadow-lg glowing-shadow-indigo hover:shadow-xl hover:-translate-y-1 transition-all active:scale-95 animate-fade-in-up"
                                style={{ animationDelay: '0.4s' }}
                            >
                                {isLogin ? t.loginAction : t.signupAction}
                            </button>

                            <div className="mt-6 text-center animate-fade-in-up" style={{ animationDelay: '0.5s' }}>
                                <button
                                    type="button"
                                    onClick={() => { setIsLogin(!isLogin); setErrorMsg(''); }}
                                    className="text-slate-600 font-semibold hover:text-indigo-600 transition-colors"
                                >
                                    {isLogin ? `${t.noAccount} ` : `${t.haveAccount} `}
                                    <span className="text-indigo-600 underline underline-offset-4 font-bold">{isLogin ? t.signup : t.login}</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

            const R = 6371e3; // Radius of the earth in m
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a =
                Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c; // Distance in m
        };

                        // so you can actually see the success screen without physically walking to the fake coords.
                        const distance = getDistanceFromLatLonInMeters(latitude, longitude, MOCK_TEACHER_LAT, MOCK_TEACHER_LON);

                                setErrorMsg(t.errorWrongCode);

                                setStatus('error');
                                setErrorMsg(t.errorLocation);
                            } else {
                                setStatus('success');

                            setSubmitting(false);
                        }, 1000);
                    }, (error) => {

                        setStatus('error');
                        setErrorMsg(t.errorGps);

                if (!studentEmail || !subject || !score) return;

                const allGrades = JSON.parse(localStorage.getItem('eduPulse_grades') || '{}');
                const studentGrades = allGrades[studentEmail] || [];

                const newGrade = {
                    id: Date.now(),
                    subject,
                    score: parseFloat(score),
                    date: new Date().toLocaleDateString(),
                    teacher: role.name
                };

                allGrades[studentEmail] = [newGrade, ...studentGrades];
                localStorage.setItem('eduPulse_grades', JSON.stringify(allGrades));

                setStudentEmail(''); setSubject(''); setScore('');
                setSuccess(true);
                setTimeout(() => setSuccess(false), 3000);
            };

            return (
                <div className="flex-1 flex flex-col px-7 pt-2 pb-28 relative z-10 w-full overflow-y-auto no-scrollbar h-full">
                    <div className="mb-8 flex justify-between items-center animate-fade-in-up">
                        <h2 className="text-3xl font-black font-display text-slate-800">{t.gradesTitle}</h2>
                        {success && (
                            <div className="bg-emerald-500 text-white text-[12px] font-bold px-4 py-2 rounded-full animate-bounce shadow-lg">
                                {t.gradeSuccess}
                            </div>
                        )}
                    </div>

                    {isStudent ? (
                        /* Student View: GPA and Grades List */
                        <>
                            <div className="glass-card rounded-[2.5rem] p-8 mb-8 relative overflow-hidden bg-gradient-to-br from-indigo-600 to-purple-600 text-white shadow-xl glowing-shadow-indigo border-none animate-fade-in-up">
                                <div className="relative z-10">
                                    <span className="text-white/70 text-sm font-bold uppercase tracking-widest">{t.gpa}</span>
                                    <h3 className="text-6xl font-black font-display mt-2">{calculateGPA(gradesData)}</h3>
                                    <div className="mt-6 flex items-center gap-2 bg-white/10 w-fit px-4 py-2 rounded-xl backdrop-blur-md">
                                        <div className="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></div>
                                        <span className="text-[12px] font-bold text-white/90 uppercase tracking-wider">Top 5% of Class</span>
                                    </div>
                                </div>
                                <Icon name="trending-up" size={140} className="absolute -right-10 -bottom-10 text-white/10 rotate-12" />
                            </div>

                            <div className="space-y-4">
                                {gradesData.length === 0 ? (
                                    <div className="text-center py-20 opacity-40">
                                        <Icon name="award" size={48} className="mx-auto mb-4" />
                                        <p className="font-bold">{t.noGrades}</p>
                                    </div>
                                ) : (
                                    gradesData.map((g, idx) => (
                                        <div key={g.id} className="glass-card rounded-2xl p-5 flex justify-between items-center animate-fade-in-up" style={{ animationDelay: `${idx * 0.1}s` }}>
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-xl bg-slate-100 flex items-center justify-center text-slate-600">
                                                    <Icon name="book" size={24} />
                                                </div>
                                                <div>
                                                    <h4 className="font-bold text-slate-800">{g.subject}</h4>
                                                    <p className="text-[11px] text-slate-400 font-bold uppercase tracking-widest">{g.date}</p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <span className={`text-2xl font-black font-display ${g.score >= 90 ? 'text-emerald-500' : g.score >= 75 ? 'text-indigo-500' : 'text-slate-600'}`}>
                                                    {g.score}
                                                </span>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </>
                    ) : (
                        /* Teacher View: Input Grades */
                        <form onSubmit={handleAssignGrade} className="glass-card rounded-[2.5rem] p-6 mb-8 shadow-xl animate-fade-in-up border-rose-100/50">
                            <div className="mb-4">
                                <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.studentEmail}</label>
                                <input
                                    type="email" value={studentEmail} onChange={e => setStudentEmail(e.target.value)}
                                    placeholder="student@example.com"
                                    className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-rose-500/10 transition-all font-medium"
                                />
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div>
                                    <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.subject}</label>
                                    <input
                                        type="text" value={subject} onChange={e => setSubject(e.target.value)}
                                        placeholder="Mathematics"
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-rose-500/10 transition-all font-medium"
                                    />
                                </div>
                                <div>
                                    <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.grade}</label>
                                    <input
                                        type="number" value={score} onChange={e => setScore(e.target.value)}
                                        placeholder="0-100" min="0" max="100"
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-rose-500/10 transition-all font-medium text-center font-black"
                                    />
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-rose-500 text-white font-display font-bold py-4 rounded-2xl shadow-lg glowing-shadow-rose active:scale-95 transition-all">
                                {t.saveGrade}
                            </button>
                        </form>
                    )}
                </div>
            );
        };

        const ScheduleScreen = ({ t, role }) => {
            const isStudent = role.role === 'student';
            const [schedule, setSchedule] = React.useState([]);
            const [className, setClassName] = React.useState('');
            const [day, setDay] = React.useState('monday');
            const [room, setRoom] = React.useState('');
            const [startTime, setStartTime] = React.useState('');
            const [endTime, setEndTime] = React.useState('');
            const [success, setSuccess] = React.useState(false);

            const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday'];

            React.useEffect(() => {
                const saved = JSON.parse(localStorage.getItem('eduPulse_schedule') || '[]');
                if (saved.length === 0) {
                    // Default Data
                    const defaults = [
                        { id: 1, name: t.math, day: 'monday', room: '302', start: '09:00', end: '10:30' },
                        { id: 2, name: t.physics, day: 'monday', room: '105', start: '11:00', end: '12:30' },
                        { id: 3, name: t.math, day: 'tuesday', room: '302', start: '14:00', end: '15:30' },
                    ];
                    localStorage.setItem('eduPulse_schedule', JSON.stringify(defaults));
                    setSchedule(defaults);
                } else {
                    setSchedule(saved);
                }
            }, [t]);

            const handleAdd = (e) => {
                e.preventDefault();
                const newItem = {
                    id: Date.now(),
                    name: className,
                    day,
                    room,
                    start: startTime,
                    end: endTime
                };
                const updated = [...schedule, newItem];
                setSchedule(updated);
                localStorage.setItem('eduPulse_schedule', JSON.stringify(updated));
                setClassName(''); setRoom(''); setStartTime(''); setEndTime('');
                setSuccess(true);
                setTimeout(() => setSuccess(false), 3000);
            };

            const today = new Date().toLocaleDateString('en-US', { weekday: 'long' }).toLowerCase();
            const todaySchedule = schedule.filter(s => s.day === (days.includes(today) ? today : 'monday'))
                .sort((a, b) => a.start.localeCompare(b.start));

            return (
                <div className="flex-1 flex flex-col px-7 pt-2 pb-28 relative z-10 w-full overflow-y-auto no-scrollbar h-full">
                    <div className="mb-8 flex justify-between items-center animate-fade-in-up">
                        <h2 className="text-3xl font-black font-display text-slate-800">{t.scheduleTitle}</h2>
                        {success && <div className="bg-emerald-500 text-white text-[12px] font-bold px-4 py-2 rounded-full shadow-lg">{t.gradeSuccess}</div>}
                    </div>

                    {isStudent ? (
                        <div className="space-y-6 relative">
                            {/* Vertical Line */}
                            <div className="absolute left-[21px] top-2 bottom-2 w-0.5 bg-slate-100"></div>

                            {todaySchedule.length === 0 ? (
                                <div className="text-center py-20 opacity-40">
                                    <Icon name="calendar-x" size={48} className="mx-auto mb-4" />
                                    <p className="font-bold">{t.noClasses}</p>
                                </div>
                            ) : (
                                todaySchedule.map((item, idx) => (
                                    <div key={item.id} className="relative flex gap-6 animate-fade-in-up" style={{ animationDelay: `${idx * 0.1}s` }}>
                                        {/* Dot */}
                                        <div className={`w-11 h-11 rounded-full flex items-center justify-center relative z-10 shadow-lg ${idx === 0 ? 'bg-indigo-600 text-white glowing-shadow-indigo' : 'bg-white text-slate-400 border border-slate-100'}`}>
                                            <Icon name="clock" size={20} />
                                        </div>

                                        <div className={`flex-1 glass-card rounded-3xl p-5 border-l-4 ${idx === 0 ? 'border-l-indigo-500 bg-indigo-50/30' : 'border-l-slate-200'}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <h4 className="font-black text-slate-800 text-lg uppercase tracking-tight">{item.name}</h4>
                                                <span className="text-[11px] font-bold px-2 py-1 bg-white rounded-lg border border-slate-100 shadow-sm text-slate-500">
                                                    {item.start} - {item.end}
                                                </span>
                                            </div>
                                            <div className="flex items-center gap-2 text-slate-400 font-bold text-[12px]">
                                                <Icon name="map-pin" size={14} />
                                                <span>{t.room} {item.room}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    ) : (
                        <form onSubmit={handleAdd} className="glass-card rounded-[2.5rem] p-6 mb-8 shadow-xl animate-fade-in-up border-teal-100/50">
                            <div className="mb-4">
                                <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">Class Name</label>
                                <input
                                    type="text" value={className} onChange={e => setClassName(e.target.value)} required
                                    placeholder="e.g. Physics 101"
                                    className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-teal-500/10 transition-all font-medium"
                                />
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-4">
                                <div>
                                    <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.day}</label>
                                    <select
                                        value={day} onChange={e => setDay(e.target.value)}
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-teal-500/10 transition-all font-medium"
                                    >
                                        {days.map(d => <option key={d} value={d}>{t[d]}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.room}</label>
                                    <input
                                        type="text" value={room} onChange={e => setRoom(e.target.value)} required
                                        placeholder="Room 101"
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-teal-500/10 transition-all font-medium"
                                    />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div>
                                    <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.startTime}</label>
                                    <input
                                        type="time" value={startTime} onChange={e => setStartTime(e.target.value)} required
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-teal-500/10 transition-all font-medium"
                                    />
                                </div>
                                <div>
                                    <label className="block text-slate-700 text-sm font-bold mb-2 ml-2">{t.endTime}</label>
                                    <input
                                        type="time" value={endTime} onChange={e => setEndTime(e.target.value)} required
                                        className="w-full bg-slate-50 border border-slate-100 rounded-2xl px-4 py-4 text-[15px] focus:outline-none focus:ring-4 focus:ring-teal-500/10 transition-all font-medium"
                                    />
                                </div>
                            </div>
                            <button type="submit" className="w-full bg-teal-500 text-white font-display font-bold py-4 rounded-2xl shadow-lg glowing-shadow-teal active:scale-95 transition-all">
                                {t.addSchedule}
                            </button>
                        </form>
                    )}
                </div>
            );
        };

        const ProfileScreen = ({ t, role, onLogout, installPrompt }) => {
            return (
                <div className="flex-1 flex flex-col px-7 pt-2 pb-28 relative z-10 w-full overflow-y-auto no-scrollbar h-full">
                    <div className="mb-8">
                        <h2 className="text-3xl font-black font-display text-slate-800">{t.profileTitle}</h2>
                    </div>

                    <div className="glass-card rounded-[2.5rem] p-8 mb-8 flex flex-col items-center shadow-xl animate-fade-in-up">
                        <div className="w-24 h-24 rounded-3xl bg-slate-100 p-1 mb-4 shadow-inner relative">
                            <img src={`https://api.dicebear.com/7.x/notionists/svg?seed=${role.name}&backgroundColor=f1f5f9`} className="w-full h-full object-cover rounded-2xl" />
                        </div>
                        <h3 className="text-2xl font-black text-slate-800 mb-1">{role.name}</h3>
                        <p className="text-slate-500 font-bold uppercase tracking-widest text-[12px] mb-6">{role.role}</p>

                        <div className="w-full space-y-3">
                            {installPrompt && (
                                <button
                                    onClick={() => installPrompt.prompt()}
                                    className="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg glowing-shadow-indigo active:scale-95 transition-all flex items-center justify-center gap-3"
                                >
                                    <Icon name="download" size={20} />
                                    {t.installApp}
                                </button>
                            )}

                            <div className="p-5 bg-slate-50 rounded-2xl border border-slate-100 flex items-center gap-4">
                                <div className="w-10 h-10 rounded-xl bg-white border border-slate-200 flex items-center justify-center text-slate-400">
                                    <Icon name="mail" size={20} />
                                </div>
                                <div>
                                    <span className="block text-[10px] uppercase tracking-tighter font-bold text-slate-400">Email Address</span>
                                    <span className="font-bold text-slate-700">{role.email}</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <button
                        onClick={onLogout}
                        className="w-full bg-rose-50 border border-rose-100 text-rose-600 font-black py-4 rounded-2xl flex items-center justify-center gap-3 hover:bg-rose-100 transition-colors animate-fade-in-up"
                    >
                        <Icon name="log-out" size={20} />
                        {t.logout}
                    </button>

                    <div className="mt-10 pt-10 border-t border-slate-100 text-center opacity-30 animate-fade-in-up">
                        <p className="text-[12px] font-black uppercase tracking-[0.2em]">{t.appTitle} v2.0</p>
                    </div>
                </div>
            );
        }

        const BottomNav = ({ t, currentView, onNavigate, isSidebar = false }) => {
            const navItems = [
                { id: 'home', label: t.home, icon: 'home' },
                { id: 'schedule', label: t.schedule, icon: 'calendar' },
                { id: 'messages', label: t.messages, icon: 'message-square' },
                { id: 'notes', label: t.notes, icon: 'file-text' },
                { id: 'me', label: t.me, icon: 'user' },
            ];

            const containerClasses = isSidebar
                ? "flex flex-col gap-4 p-6"
                : "absolute bottom-0 left-0 right-0 h-[100px] glass-panel rounded-t-[2.5rem] flex justify-around items-center px-6 pb-6 pt-4 z-40 mobile-nav";

            const itemClasses = isSidebar
                ? "flex items-center gap-4 px-6 py-4 rounded-2xl transition-all cursor-pointer group"
                : "flex flex-col items-center justify-center gap-1 cursor-pointer w-16 group";

            return (
                <div className={containerClasses}>
                    {isSidebar && (
                        <div className="mb-10 px-4">
                            <div className="flex items-center gap-3 mb-8">
                                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg glowing-shadow-indigo">
                                    <Icon name="graduation-cap" size={24} />
                                </div>
                                <h1 className="text-2xl font-black tracking-tighter text-slate-900">{t.appTitle}</h1>
                            </div>
                        </div>
                    )}
                    {navItems.map(item => {
                        const isActive = currentView === item.id;
                        return (
                            <div key={item.id} onClick={() => onNavigate(item.id)} className={`${itemClasses} ${isSidebar && isActive ? 'bg-indigo-600 text-white shadow-lg glowing-shadow-indigo' : ''}`}>
                                <div className={`relative flex items-center justify-center ${isSidebar ? '' : 'w-14 h-12 rounded-[18px] transition-all duration-300'} ${!isSidebar && isActive ? 'text-white shadow-lg glowing-shadow-indigo pointer-events-none' : 'text-slate-400 group-hover:text-slate-700'}`}>
                                    {(isActive && !isSidebar) && <div className="absolute inset-0 bg-gradient-to-tr from-indigo-600 to-indigo-500 rounded-[18px]"></div>}
                                    <div className="relative z-10 flex flex-col items-center gap-1">
                                        <Icon
                                            name={item.icon}
                                            size={isActive ? 22 : 24}
                                            className={isActive || isSidebar ? '' : 'transition-transform group-hover:scale-110 group-active:scale-95'}
                                        />
                                    </div>
                                </div>
                                <span className={`${isSidebar ? 'font-black text-[15px]' : 'text-[11px] font-bold tracking-wide transition-all duration-300'} ${isActive ? (isSidebar ? 'text-white' : 'text-indigo-600 opacity-100') : (isSidebar ? 'text-slate-500 group-hover:text-slate-900' : 'text-slate-400 opacity-0 group-hover:opacity-100')}`}>
                                    {item.label}
                                </span>
                            </div>
                        );
                    })}
                </div>
            );
        };

        // 4. Main App Component
        const App = () => {
            const [lang, setLang] = React.useState('en');
            const [userRole, setUserRole] = React.useState(null); // Will store {email, name, role}
            const [currentView, setCurrentView] = React.useState('home');
            const [installPrompt, setInstallPrompt] = React.useState(null);

            // Check for persistent session
            React.useEffect(() => {
                const session = localStorage.getItem('eduPulse_session');
                if (session) {
                    try {
                        const user = JSON.parse(session);
                        setUserRole(user);
                    } catch (e) { }
                }

                // PWA Install Prompt
                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    setInstallPrompt(e);
                });

                // Register Service Worker
                if ('serviceWorker' in navigator) {
                    window.addEventListener('load', () => {
                        navigator.serviceWorker.register('./sw.js').then(reg => {
                            console.log('SW Registered', reg);
                        });
                    });
                }
            }, []);

            const t = translations[lang];

            const toggleLang = () => {
                setLang(l => l === 'en' ? 'zh' : 'en');
            };

            const handleLogout = () => {
                localStorage.removeItem('eduPulse_session');
                setUserRole(null);
                setCurrentView('home');
            };

            const handleBack = () => {
                setCurrentView('home');
            };

            return (
                <div className="app-shell">
                    {/* Sidebar for Desktop */}
                    {userRole && (
                        <div className="sidebar-container">
                            <BottomNav t={t} currentView={currentView} onNavigate={setCurrentView} isSidebar={true} />
                        </div>
                    )}

                    <div className="main-content">
                        {/* Fluid App Container */}
                        <div className="w-full h-full mesh-bg flex flex-col relative z-20">

                            {/* Optional: Floating Island Hidden on Large screen or kept for style */}
                            <div className="hidden md:flex absolute top-3 left-1/2 -translate-x-1/2 w-32 h-8 bg-black rounded-full z-50 flex items-center justify-between px-3 opacity-20 hover:opacity-100 transition-opacity">
                                <div className="w-2 h-2 rounded-full bg-indigo-500 animate-pulse"></div>
                                <div className="w-2.5 h-2.5 rounded-full bg-slate-800"></div>
                            </div>

                            {/* Top App Bar with Limiter */}
                            <div className="content-limiter">
                                <div className="px-6 pt-10 md:pt-16 pb-2 flex justify-between items-center z-30 relative animate-fade-in-up">
                                    {userRole ? (
                                        <button
                                            onClick={currentView === 'home' ? handleLogout : handleBack}
                                            className="h-11 w-11 glass-card rounded-full flex items-center justify-center text-slate-600 hover:text-indigo-600 hover:scale-105 active:scale-95 transition-all shadow-sm"
                                        >
                                            <Icon name="arrow-left" size={20} />
                                        </button>
                                    ) : (
                                        <div className="w-11"></div>
                                    )}

                                    <button
                                        onClick={toggleLang}
                                        className="glass-card text-indigo-700 px-5 py-2.5 rounded-full text-sm font-bold shadow-sm shadow-indigo-100 flex items-center gap-2 hover:bg-white hover:scale-105 active:scale-95 transition-all"
                                    >
                                        <Icon name="globe" size={16} className="text-indigo-500" />
                                        <span className="font-display tracking-wide">{t.switchLang}</span>
                                    </button>
                                </div>

                                {/* Content Routing with Limiter */}
                                <div className="flex-1 w-full overflow-hidden">
                                    {!userRole ? (
                                        <AuthScreen t={t} onLogin={(user) => { setUserRole(user); setCurrentView('home'); }} />
                                    ) : (
                                        currentView === 'attendance' ? (
                                            <AttendanceScreen t={t} role={userRole} />
                                        ) : currentView === 'homework' ? (
                                            <HomeworkScreen t={t} role={userRole} />
                                        ) : currentView === 'grades' ? (
                                            <GradesScreen t={t} role={userRole} />
                                        ) : currentView === 'schedule' ? (
                                            <ScheduleScreen t={t} role={userRole} />
                                        ) : currentView === 'me' ? (
                                            <ProfileScreen t={t} role={userRole} onLogout={handleLogout} installPrompt={installPrompt} />
                                        ) : (
                                            <HomeScreen t={t} role={userRole.role} lang={lang} onNavigate={setCurrentView} />
                                        )
                                    )}
                                </div>
                            </div>

                            {/* Mobile Navigation */}
                            {userRole && (
                                <div className="md:hidden lg:hidden">
                                    <BottomNav t={t} currentView={currentView} onNavigate={setCurrentView} />
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
